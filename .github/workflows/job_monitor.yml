name: AI Job Monitor

# When to run automatically
on:
  schedule:
    # Runs at 9:00 AM UTC daily
    - cron: '0 9 * * *'
    # Also runs at 9:00 PM UTC daily
    - cron: '0 21 * * *'
  # Allows manual trigger from GitHub UI
  workflow_dispatch:

# What the job does
jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get your code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Set up Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 4: Run the scraper
      - name: Run job scraper
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python job_scraper.py
      
      # Step 5: Commit history file (optional)
      - name: Commit job history
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add job_history.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update job history $(date -u +'%Y-%m-%d')"
          git push
